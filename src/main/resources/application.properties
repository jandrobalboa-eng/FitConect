# ============================================================
# FitConnect - Configuración principal
# Railway lee las variables de entorno automáticamente
# ============================================================

server.port=${PORT:8080}

# Base de datos - Railway inyecta MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/fitness_app?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:tu_password_aqui}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:fitconnect_clave_local_dev_solo}
jwt.expiration=86400000

# CORS - incluye el dominio de Railway cuando lo tengáis
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logs (menos verboso en producción)
logging.level.com.fitconnect=INFO
logging.level.org.springframework.security=WARN

resend.api.key=${RESEND_API_KEY:}